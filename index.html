<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Daring Focus Group</title>

<style>
body{
font-family: Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1c1c1c;
padding:40px;
border-radius:16px;
width:400px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:30px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:14px;
background:#ff2ea6;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff0f96;
}

#status{
margin-top:15px;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h1>Focus Group</h1>

<form id="form">

<input name="name" placeholder="Имя">

<input name="instagram" placeholder="Instagram">

<input name="city" placeholder="Город">

<input name="level" placeholder="Опыт в бьюти">

<input name="clients" placeholder="Сколько клиентов">

<textarea name="why" placeholder="Почему хотите участвовать"></textarea>

<button type="submit">Отправить заявку</button>

</form>

<div id="status"></div>

</div>

<script>

const ENDPOINT = "https://script.google.com/macros/s/AKfycbw2mPpHmScRCGsL3GNj4nBPpMr_5t4bZAi3oLdJ-v4ziJ2rp4X8luHPpnU1wGOjCa1drQ/exec";

const form = document.getElementById("form");
const status = document.getElementById("status");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

status.innerText="Отправляем...";

const formData = new FormData(form);

try{

await fetch(ENDPOINT,{
method:"POST",
body:formData
});

status.innerText="Заявка отправлена ❤️";

form.reset();

}catch(err){

status.innerText="Ошибка отправки";

}

});

</script>

</body>
</html>
